<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Psudo Classes</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Link */
      .link:link {
        color: seagreen;
      }
      /* Visited */
      .visited:visited {
        color: tomato;
      }
      /* Hover  */
      .hover:hover {
        color: violet;
        font-size: 3rem;
      }
      /* Active  */
      .active:active {
        color: yellow;
      }
    </style>
  </head>
  <body>
    <a class="link" href="https://www.nycgo.com">NYC.com</a>
    <a class="visited" href="https://www.wikipedia.com">Wikipedia</a>
    <a class="hover" href="https://www.twitch.tv">Twitch</a>
    <a class="active" href="https://www.udemy.com">Udemy</a>
  </body>
</html>
